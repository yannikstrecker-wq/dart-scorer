<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darts Turnier unter Freunden - V3 PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.container{max-width:1400px;margin:auto;padding:20px;}
h1{text-align:center;color:#00f5c4;}

input{
  width:100%;
  padding:20px;
  margin:12px 0;
  border-radius:12px;
  border:none;
  font-size:20px;
}

select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button{
  background:#00f5c4;
  border:none;
  padding:12px 16px;
  margin:6px 6px 6px 0;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#1c1c1c;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}

.final-card{
  border:3px solid gold;
  box-shadow:0 0 25px gold;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 10px gold;}
  50%{box-shadow:0 0 40px gold;}
  100%{box-shadow:0 0 10px gold;}
}

table{width:100%;margin-top:20px;border-collapse:collapse;}
th{color:#00f5c4;padding:8px;border-bottom:1px solid #333;}
td{text-align:center;padding:8px;}
.highlight-row{background:#1f2f2f;}

.bracket-wrapper{margin-top:60px;}
.bracket-title{
  text-align:center;
  font-size:26px;
  margin-bottom:30px;
  color:#00f5c4;
}

.bracket{
  display:flex;
  justify-content:space-between;
  gap:40px;
}

.bracket-column{width:32%;}
.bracket-column h3{
  text-align:center;
  margin-bottom:15px;
  color:#00f5c4;
}

.match-box{
  background:#1c1c1c;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  text-align:center;
}

.final-highlight{
  border:2px solid gold;
  box-shadow:0 0 15px gold;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal{
  background:#222;
  padding:30px;
  border-radius:16px;
  max-width:700px;
  text-align:center;
}

.podium{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:30px;
  margin-top:40px;
}

.step{
  width:150px;
  text-align:center;
  border-radius:10px;
  padding:10px;
  font-weight:bold;
}

.gold-step{background:gold;color:black;height:160px;}
.silver-step{background:silver;color:black;height:130px;}
.bronze-step{background:#cd7f32;color:black;height:110px;}

.confetti{
  position:fixed;
  width:8px;
  height:8px;
  top:0;
  animation:fall 3s linear forwards;
  z-index:2000;
}

@keyframes fall{
  to{transform:translateY(100vh) rotate(720deg);opacity:0;}
}
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>

let tournament=null
const app=document.getElementById("app")

function shuffle(a){return[...a].sort(()=>Math.random()-0.5)}

function renderSetup(){
app.innerHTML=`
<h1>Darts Turnier unter Freunden</h1>

<input id="tournamentName" placeholder="Turniername">

<select id="groups">
<option value="1">1 Gruppe</option>
<option value="2">2 Gruppen</option>
</select>

<select id="count">
<option value="4">4 Spieler</option>
<option value="5">5 Spieler</option>
<option value="6">6 Spieler</option>
<option value="7">7 Spieler</option>
<option value="8">8 Spieler</option>
</select>

<div id="players"></div>
<button onclick="startTournament()">Turnier starten</button>
`
renderPlayers()
}

function renderPlayers(){
let c=parseInt(document.getElementById("count").value)
let div=document.getElementById("players")
div.innerHTML=""
for(let i=0;i<c;i++)
div.innerHTML+=`<input id="p${i}" placeholder="Spieler ${i+1}">`
}

document.addEventListener("change",e=>{
if(e.target.id==="count")renderPlayers()
})

function createMatch(p1,p2,stage){
return{id:crypto.randomUUID(),p1,p2,legs1:0,legs2:0,finished:false,stage}
}

function schedule(matches){
let result=[],remaining=[...matches],last=[]
while(remaining.length){
let idx=remaining.findIndex(m=>!last.includes(m.p1.id)&&!last.includes(m.p2.id))
if(idx===-1)idx=0
let m=remaining.splice(idx,1)[0]
result.push(m)
last=[m.p1.id,m.p2.id]
}
return result
}

function startTournament(){
let name=document.getElementById("tournamentName").value.trim()
if(!name)return alert("Turniername fehlt")

let count=parseInt(document.getElementById("count").value)
let groupCount=parseInt(document.getElementById("groups").value)

let players=[]
for(let i=0;i<count;i++){
let n=document.getElementById("p"+i).value.trim()
if(!n)return alert("Spielernamen fehlen")
players.push({id:crypto.randomUUID(),name:n})
}

players=shuffle(players)

let groups=[]
if(groupCount===1)groups=[players]
else{
let half=Math.ceil(players.length/2)
groups=[players.slice(0,half),players.slice(half)]
}

let groupMatches=[]
groups.forEach(g=>{
let m=[]
for(let i=0;i<g.length;i++)
for(let j=i+1;j<g.length;j++)
m.push(createMatch(g[i],g[j],"group"))
groupMatches.push(schedule(m))
})

tournament={name,groups,groupMatches,knockout:[],phase:"group"}
render()
}

function addLeg(id,p){
let matches=tournament.phase==="group"?tournament.groupMatches.flat():tournament.knockout
let m=matches.find(x=>x.id===id)
if(m.finished)return
if(p===1)m.legs1++
else m.legs2++
if(m.legs1===3||m.legs2===3){
m.finished=true
showWinner(m)
checkPhase()
}
render()
}

function calculateTable(matches){
let stats={}
matches.forEach(m=>{
[m.p1,m.p2].forEach(p=>{
if(!stats[p.id])stats[p.id]={name:p.name,points:0,diff:0}
})
if(m.finished){
let s1=stats[m.p1.id]
let s2=stats[m.p2.id]
s1.diff+=m.legs1-m.legs2
s2.diff+=m.legs2-m.legs1
if(m.legs1>m.legs2)s1.points++
else s2.points++
}
})
return Object.values(stats).sort((a,b)=>b.points-a.points||b.diff-a.diff)
}

function checkPhase(){
if(tournament.phase==="group"&&tournament.groupMatches.flat().every(m=>m.finished))startKO()
else if(tournament.phase==="semi"&&tournament.knockout.filter(m=>m.stage==="semi").every(m=>m.finished)){createFinals();tournament.phase="finals"}
else if(tournament.phase==="finals"&&tournament.knockout.filter(m=>m.stage!=="semi").every(m=>m.finished))tournament.phase="finished"
}

function startKO(){
let tables=tournament.groupMatches.map(g=>calculateTable(g))
if(tournament.groups.length===1){
let t=tables[0]
tournament.knockout=[createMatch(t[0],t[3],"semi"),createMatch(t[1],t[2],"semi")]
}else{
let A=tables[0],B=tables[1]
tournament.knockout=[createMatch(A[0],B[1],"semi"),createMatch(B[0],A[1],"semi")]
}
tournament.phase="semi"
}

function createFinals(){
let s=tournament.knockout.filter(m=>m.stage==="semi")
let w1=s[0].legs1>s[0].legs2?s[0].p1:s[0].p2
let l1=s[0].legs1>s[0].legs2?s[0].p2:s[0].p1
let w2=s[1].legs1>s[1].legs2?s[1].p1:s[1].p2
let l2=s[1].legs1>s[1].legs2?s[1].p2:s[1].p1
tournament.knockout.push(createMatch(l1,l2,"third"))
tournament.knockout.push(createMatch(w1,w2,"final"))
}

function renderBracket(){
if(tournament.phase==="group")return
app.innerHTML+=`
<div class="bracket-wrapper">
<div class="bracket-title">Turnierbaum</div>
<div class="bracket">

<div class="bracket-column">
<h3>Halbfinale</h3>
${tournament.knockout.filter(m=>m.stage==="semi")
.map(m=>`<div class="match-box">${m.p1.name} vs ${m.p2.name}${m.finished?`<br><strong>${m.legs1}:${m.legs2}</strong>`:""}</div>`).join("")}
</div>

<div class="bracket-column">
<h3>Kleines Finale</h3>
${tournament.knockout.filter(m=>m.stage==="third")
.map(m=>`<div class="match-box">${m.p1.name} vs ${m.p2.name}${m.finished?`<br><strong>${m.legs1}:${m.legs2}</strong>`:""}</div>`).join("")}
</div>

<div class="bracket-column">
<h3>Finale</h3>
${tournament.knockout.filter(m=>m.stage==="final")
.map(m=>`<div class="match-box final-highlight">${m.p1.name} vs ${m.p2.name}${m.finished?`<br><strong>${m.legs1}:${m.legs2}</strong>`:""}</div>`).join("")}
</div>

</div>
</div>`
}

function render(){
app.innerHTML=`<h1>${tournament.name}</h1>`

if(tournament.phase==="group"){
tournament.groupMatches.forEach((g,i)=>{
let table=calculateTable(g)
app.innerHTML+=`
<h2>Gruppe ${i+1}</h2>
<table>
<tr><th>#</th><th>Spieler</th><th>P</th><th>Diff</th></tr>
${table.map((p,i)=>`
<tr class="${i<2?'highlight-row':''}">
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.points}</td>
<td>${p.diff}</td>
</tr>`).join("")}
</table>`
})
}

let matches=tournament.phase==="group"?tournament.groupMatches.flat():tournament.knockout
let next=matches.find(m=>!m.finished)

if(next){
let cls=next.stage==="final"?"card final-card":"card"
app.innerHTML+=`
<div class="${cls}">
<h2>${next.stage==="final"?"GRAND FINAL 🏆":""}</h2>
<h2>${next.p1.name} vs ${next.p2.name}</h2>
<h3>${next.legs1}:${next.legs2}</h3>
<button onclick="addLeg('${next.id}',1)">Leg ${next.p1.name}</button>
<button onclick="addLeg('${next.id}',2)">Leg ${next.p2.name}</button>
</div>`
}

renderBracket()

if(tournament.phase==="finished")renderCeremony()
}

function showWinner(m){
const o=document.createElement("div")
o.className="overlay"
o.innerHTML=`<div class="modal">
<h2>Sieger: ${m.legs1>m.legs2?m.p1.name:m.p2.name}</h2>
<h3>${m.legs1}:${m.legs2}</h3>
<button onclick="this.closest('.overlay').remove()">Weiter</button>
</div>`
document.body.appendChild(o)
}

function renderCeremony(){
let f=tournament.knockout.find(m=>m.stage==="final")
let t=tournament.knockout.find(m=>m.stage==="third")
let gold=f.legs1>f.legs2?f.p1.name:f.p2.name
let silver=f.legs1>f.legs2?f.p2.name:f.p1.name
let bronze=t?(t.legs1>t.legs2?t.p1.name:t.p2.name):""

app.innerHTML+=`
<div class="podium">
<div class="step silver-step">🥈 ${silver}</div>
<div class="step gold-step">🥇 ${gold}</div>
<div class="step bronze-step">🥉 ${bronze}</div>
</div>
<button onclick="location.reload()">Neues Turnier</button>`
launchConfetti()
}

function launchConfetti(){
for(let i=0;i<80;i++){
const c=document.createElement("div")
c.className="confetti"
c.style.left=Math.random()*100+"vw"
c.style.background=["gold","#00f5c4","red","blue","lime"][Math.floor(Math.random()*5)]
document.body.appendChild(c)
setTimeout(()=>c.remove(),4000)
}
}

renderSetup()

</script>
</body>
</html>
