<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dart Tournament Ultimate Stable</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
.container { max-width:1300px; margin:auto; padding:20px; }

h1 { color:#00f5c4; }

button {
  background:#00f5c4;
  border:none;
  padding:10px 14px;
  margin:6px 6px 6px 0;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

input, select {
  width:100%;
  padding:8px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}

.card { background:#1c1c1c; padding:20px; border-radius:12px; margin-top:20px; }

table { width:100%; margin-top:20px; border-collapse:collapse; }
th { color:#00f5c4; padding:6px; border-bottom:1px solid #333; }
td { text-align:center; padding:6px; }

.highlight-row { background:#1f2f2f; }

.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal {
  background:#222;
  padding:30px;
  border-radius:16px;
  max-width:700px;
  max-height:80vh;
  overflow:auto;
  text-align:center;
}

.gold { color:gold; font-size:24px; }

.bracket {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:40px;
  margin-top:40px;
}

.bracket h3 { color:#00f5c4; }

.match-box {
  background:#1c1c1c;
  padding:8px;
  border-radius:8px;
  margin-bottom:10px;
}

.final-box {
  border:3px solid gold;
  box-shadow:0 0 15px gold;
}

.podium {
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:30px;
  margin-top:40px;
}

.step {
  width:150px;
  text-align:center;
  border-radius:10px;
  padding:10px;
  font-weight:bold;
}

.gold-step { background:gold; color:black; height:160px; }
.silver-step { background:silver; color:black; height:130px; }
.bronze-step { background:#cd7f32; color:black; height:110px; }

.confetti {
  position:fixed;
  width:8px;
  height:8px;
  top:0;
  animation:fall 3s linear forwards;
  z-index:2000;
}

@keyframes fall {
  to { transform:translateY(100vh) rotate(720deg); opacity:0; }
}
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>

let tournament=null

function shuffle(a){ return [...a].sort(()=>Math.random()-0.5) }

function renderSetup(){
  document.getElementById("app").innerHTML=`
    <h1>Dart Tournament Ultimate Stable</h1>

    <input id="tournamentName" placeholder="Turniername">

    <select id="groups">
      <option value="1">1 Gruppe</option>
      <option value="2">2 Gruppen</option>
    </select>

    <select id="count">
      <option value="4">4 Spieler</option>
      <option value="5">5 Spieler</option>
      <option value="6">6 Spieler</option>
      <option value="7">7 Spieler</option>
      <option value="8">8 Spieler</option>
    </select>

    <div id="players"></div>

    <button onclick="startTournament()">Turnier starten</button>
  `
  renderPlayers()
}

function renderPlayers(){
  let c=parseInt(document.getElementById("count").value)
  let div=document.getElementById("players")
  div.innerHTML=""
  for(let i=0;i<c;i++)
    div.innerHTML+=`<input id="p${i}" placeholder="Spieler ${i+1}">`
}

document.addEventListener("change",e=>{
  if(e.target.id==="count") renderPlayers()
})

function createMatch(p1,p2,stage){
  return {id:crypto.randomUUID(),p1,p2,legs1:0,legs2:0,finished:false,stage}
}

function scheduleMatches(matches){
  let result=[]
  let remaining=[...matches]
  let last=[]
  while(remaining.length){
    let idx=remaining.findIndex(m=>!last.includes(m.p1.id)&&!last.includes(m.p2.id))
    if(idx===-1) idx=0
    let m=remaining.splice(idx,1)[0]
    result.push(m)
    last=[m.p1.id,m.p2.id]
  }
  return result
}

function startTournament(){
  let name=document.getElementById("tournamentName").value.trim()
  if(!name) return alert("Turniername fehlt")

  let count=parseInt(document.getElementById("count").value)
  let groupCount=parseInt(document.getElementById("groups").value)

  let players=[]
  for(let i=0;i<count;i++){
    let n=document.getElementById("p"+i).value.trim()
    if(!n) return alert("Spielernamen fehlen")
    players.push({id:crypto.randomUUID(),name:n})
  }

  players=shuffle(players)

  let groups=[]
  if(groupCount===1){
    groups=[players]
  } else {
    let half=Math.ceil(players.length/2)
    groups=[players.slice(0,half),players.slice(half)]
  }

  let groupMatches=[]
  groups.forEach(g=>{
    let matches=[]
    for(let i=0;i<g.length;i++)
      for(let j=i+1;j<g.length;j++)
        matches.push(createMatch(g[i],g[j],"group"))
    groupMatches.push(scheduleMatches(matches))
  })

  tournament={
    name,
    groups,
    groupMatches,
    knockout:[],
    phase:"group"
  }

  render()
}

function calculateTable(matches){
  let stats={}
  matches.forEach(m=>{
    [m.p1,m.p2].forEach(p=>{
      if(!stats[p.id])
        stats[p.id]={name:p.name,played:0,wins:0,losses:0,diff:0,points:0}
    })
    if(m.finished){
      let s1=stats[m.p1.id]
      let s2=stats[m.p2.id]
      s1.played++; s2.played++
      s1.diff+=m.legs1-m.legs2
      s2.diff+=m.legs2-m.legs1
      if(m.legs1>m.legs2){s1.wins++;s1.points++;s2.losses++}
      else{s2.wins++;s2.points++;s1.losses++}
    }
  })
  return Object.values(stats).sort((a,b)=>b.points-a.points||b.diff-a.diff)
}

function addLeg(id,player){
  let matches=tournament.phase==="group"
    ? tournament.groupMatches.flat()
    : tournament.knockout

  let m=matches.find(x=>x.id===id)
  if(m.finished) return

  if(player===1) m.legs1++
  else m.legs2++

  if(m.legs1===3||m.legs2===3){
    m.finished=true
    showOverlay(m)
    checkPhase()
  }

  render()
}

function showOverlay(match){
  let winner=match.legs1>match.legs2?match.p1.name:match.p2.name
  const o=document.createElement("div")
  o.className="overlay"
  o.innerHTML=`
    <div class="modal">
      <div class="gold">Sieger: ${winner}</div>
      <h3>${match.legs1}:${match.legs2}</h3>
      <button onclick="this.closest('.overlay').remove()">Weiter</button>
    </div>
  `
  document.body.appendChild(o)
}

function checkPhase(){
  if(tournament.phase==="group"){
    if(tournament.groupMatches.flat().every(m=>m.finished)){
      startKO()
    }
  }
  else if(tournament.phase==="semi"){
    if(tournament.knockout.filter(m=>m.stage==="semi").every(m=>m.finished)){
      createFinals()
      tournament.phase="finals"
    }
  }
  else if(tournament.phase==="finals"){
    if(tournament.knockout.filter(m=>m.stage!=="semi").every(m=>m.finished)){
      tournament.phase="finished"
    }
  }
}

function startKO(){
  let tables=tournament.groupMatches.map(g=>calculateTable(g))

  if(tournament.groups.length===1){
    let t=tables[0]
    tournament.knockout=[
      createMatch(t[0],t[3],"semi"),
      createMatch(t[1],t[2],"semi")
    ]
  } else {
    let A=tables[0]
    let B=tables[1]
    tournament.knockout=[
      createMatch(A[0],B[1],"semi"),
      createMatch(B[0],A[1],"semi")
    ]
  }

  tournament.phase="semi"
}

function createFinals(){
  let semis=tournament.knockout.filter(m=>m.stage==="semi")

  let w1=semis[0].legs1>semis[0].legs2?semis[0].p1:semis[0].p2
  let l1=semis[0].legs1>semis[0].legs2?semis[0].p2:semis[0].p1
  let w2=semis[1].legs1>semis[1].legs2?semis[1].p1:semis[1].p2
  let l2=semis[1].legs1>semis[1].legs2?semis[1].p2:semis[1].p1

  tournament.knockout.push(createMatch(l1,l2,"third"))
  tournament.knockout.push(createMatch(w1,w2,"final"))
}

function render(){
  const app=document.getElementById("app")
  app.innerHTML=`<h1>${tournament.name}</h1>
  <button onclick="showSchedule()">Spielplan</button>`

  if(tournament.phase==="group"){
    tournament.groupMatches.forEach((g,i)=>{
      let table=calculateTable(g)
      app.innerHTML+=`
        <h2>Gruppe ${i+1}</h2>
        <table>
          <tr><th>#</th><th>Spieler</th><th>P</th><th>Diff</th></tr>
          ${table.map((p,i)=>`
            <tr class="${i<2?'highlight-row':''}">
              <td>${i+1}</td>
              <td>${p.name}</td>
              <td>${p.points}</td>
              <td>${p.diff}</td>
            </tr>
          `).join("")}
        </table>
      `
    })
  }

  let matches=tournament.phase==="group"
    ? tournament.groupMatches.flat()
    : tournament.knockout

  let next=matches.find(m=>!m.finished)

  if(next){
    let cls=next.stage==="final"?"card final-box":"card"
    app.innerHTML+=`
      <div class="${cls}">
        <h2>${next.stage==="final"?"GRAND FINAL":""}</h2>
        <h2>${next.p1.name} vs ${next.p2.name}</h2>
        <h3>${next.legs1}:${next.legs2}</h3>
        <button onclick="addLeg('${next.id}',1)">Leg ${next.p1.name}</button>
        <button onclick="addLeg('${next.id}',2)">Leg ${next.p2.name}</button>
      </div>
    `
  }

  if(tournament.phase!=="group"){
    renderBracket()
  }

  if(tournament.phase==="finished"){
    renderCeremony()
  }
}

function renderBracket(){
  const app=document.getElementById("app")
  app.innerHTML+=`
    <div class="bracket">
      <div>
        <h3>Halbfinale</h3>
        ${tournament.knockout.filter(m=>m.stage==="semi")
          .map(m=>`<div class="match-box">${m.p1.name} vs ${m.p2.name}</div>`).join("")}
      </div>
      <div>
        <h3>Kleines Finale</h3>
        ${tournament.knockout.filter(m=>m.stage==="third")
          .map(m=>`<div class="match-box">${m.p1.name} vs ${m.p2.name}</div>`).join("")}
      </div>
      <div>
        <h3>Finale</h3>
        ${tournament.knockout.filter(m=>m.stage==="final")
          .map(m=>`<div class="match-box final-box">${m.p1.name} vs ${m.p2.name}</div>`).join("")}
      </div>
    </div>
  `
}

function showSchedule(){
  let all=[...tournament.groupMatches.flat(),...tournament.knockout]
  const o=document.createElement("div")
  o.className="overlay"
  o.innerHTML=`
    <div class="modal">
      <h2>Spielplan</h2>
      ${all.map(m=>
        `${m.p1.name} vs ${m.p2.name}
        ${m.finished?`→ ${m.legs1}:${m.legs2}`:"(offen)"}`
      ).join("<br>")}
      <br><br>
      <button onclick="this.closest('.overlay').remove()">Schließen</button>
    </div>
  `
  document.body.appendChild(o)
}

function renderCeremony(){
  let final=tournament.knockout.find(m=>m.stage==="final")
  let third=tournament.knockout.find(m=>m.stage==="third")

  let gold=final.legs1>final.legs2?final.p1.name:final.p2.name
  let silver=final.legs1>final.legs2?final.p2.name:final.p1.name
  let bronze=third? (third.legs1>third.legs2?third.p1.name:third.p2.name):""

  document.getElementById("app").innerHTML+=`
    <div class="podium">
      <div class="step silver-step">🥈 ${silver}</div>
      <div class="step gold-step">🥇 ${gold}</div>
      <div class="step bronze-step">🥉 ${bronze}</div>
    </div>
    <br>
    <button onclick="restart()">Neues Turnier starten</button>
  `
  launchConfetti()
}

function launchConfetti(){
  for(let i=0;i<80;i++){
    const c=document.createElement("div")
    c.className="confetti"
    c.style.left=Math.random()*100+"vw"
    c.style.background=["gold","#00f5c4","red","blue","lime"][Math.floor(Math.random()*5)]
    document.body.appendChild(c)
    setTimeout(()=>c.remove(),4000)
  }
}

function restart(){
  tournament=null
  renderSetup()
}

renderSetup()

</script>
</body>
</html>
